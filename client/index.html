<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
    }

    /* Quantum Grid Background */
    .quantum-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(147, 51, 234, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(147, 51, 234, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      perspective: 1000px;
      z-index: -1;
    }

    .quantum-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, #020617 80%);
    }

    /* Glowing Core */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      z-index: 10;
    }

    .core-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .core-ring {
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      border-top-color: #9333ea;
      border-radius: 50%;
      animation: spin 2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      filter: drop-shadow(0 0 10px #9333ea);
    }

    .core-ring:nth-child(2) {
      inset: 10px;
      border-top-color: #c084fc;
      animation-duration: 1.5s;
      animation-direction: reverse;
    }

    .core-ring:nth-child(3) {
      inset: 20px;
      border-top-color: #06b6d4;
      animation-duration: 3s;
    }

    .core-center {
      position: absolute;
      inset: 40px;
      background: #9333ea;
      border-radius: 50%;
      box-shadow: 0 0 30px #9333ea, 0 0 60px #c084fc;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(0.8);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #9333ea;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .brand {
      text-align: center;
    }

    .brand-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #9333ea, #c084fc, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .brand-subtitle {
      font-size: 0.6rem;
      color: #475569;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    #root:not(:empty)~.splash-ui {
      opacity: 0;
      pointer-events: none;
    }

    .splash-ui {
      transition: opacity 0.5s ease-out;
      background: #020617;
      /* Solid background to prevent ghosting */
    }
  </style>
</head>

<body>
  <div class="quantum-grid"></div>
  <div id="root"></div>
  <div class="splash-ui"
    style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999;">
    <div class="loader-container">
      <div class="core-wrapper">
        <div class="core-ring"></div>
        <div class="core-ring"></div>
        <div class="core-ring"></div>
        <div class="core-center"></div>
      </div>
      <div class="brand">
        <h1 class="brand-title">QuMail</h1>
        <p class="brand-subtitle">Quantum Secure Identity Node</p>
      </div>
      <div class="status-text">Synchronizing Entanglement...</div>
    </div>
  </div>
  <script>
    // Extra safety: Remove splash when React takes over
    const observer = new MutationObserver((mutations) => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const splash = document.querySelector('.splash-ui');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
